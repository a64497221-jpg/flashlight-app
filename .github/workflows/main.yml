name: Build Android APK

on:
  push:
    branches: [ main, debug/build-single-arch, debug/ci-improvements ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        set -e
        sudo dpkg --add-architecture i386
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libncurses5-dev \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          m4 \
          pkg-config \
          libgdbm-dev \
          libdb-dev \
          libbz2-dev \
          libreadline-dev \
          libsqlite3-dev \
          liblzma-dev \
          tk-dev

    - name: Ensure Android SDK/NDK Variables
      run: |
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/Sdk" >> $GITHUB_ENV || true
        echo "ANDROID_NDK_HOME=/usr/local/lib/Android/SDK/ndk/27.3.13750724" >> $GITHUB_ENV || true
        echo "ANDROID_NDK=/usr/local/lib/Android/SDK/ndk/27.3.13750724" >> $GITHUB_ENV || true
        echo "ANDROID_HOME=/usr/local/lib/android/SDK" >> $GITHUB_ENV || true

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 buildozer

    - name: Pre-install Python build deps
      run: |
        pip install --upgrade pip setuptools wheel

    - name: Run Buildozer
      env:
        BUILDOZER_ALLOW_ROOT: '1'
        DEBIAN_FRONTEND: noninteractive
        ANDROID_NDK_HOME: /usr/local/lib/Android/SDK/ndk/27.3.13750724
        ANDROID_SDK_ROOT: /usr/local/lib/android/Sdk
        ANDROID_BUILD_TOOLS: 33.0.2
      run: |
        set -e
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
